reviews:
  - date: '2026-06-03'
    rating: 2
    summary: >-
      The University of Nottingham exposes one confirmed-live public machine
      interface: the Repository@Nottingham OAI-PMH endpoint (Worktribe), which
      returned valid OAI-PMH XML to a direct Identify request. The legacy
      EPrints / eTheses OAI-PMH endpoints are documented but now sit behind an
      AWS WAF human-verification challenge and did not return harvestable
      metadata, so they are cataloged honestly as gated. No general-purpose
      developer portal or open-data API portal was found; student records,
      timetabling, library discovery, and identity systems are behind SSO. Three
      official GitHub organizations were verified. No endpoints were fabricated.
    endpoints:
